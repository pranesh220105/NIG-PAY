name: college_fee_wallet
description: College Fee Wallet App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon.png"
  min_sdk_android: 24

flutter_native_splash:
  color: "#0A7D71"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#0A7D71"
    image: assets/branding/splash_logo.png
